<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing System</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <h1 id="mainheading">Retail Billing System</h1>
    <div class="container">
        <div class="card">
                <h2>Add to cart</h2>
                <div class="product-group">
                    <div>
                        <label for="product-filter">Product Info</label>
                        <input type="text" id="product-filter" name="product-filter" placeholder="Enter Product ID..." required/>
                    </div>
                    <div>
                        <label for="product-price">Product Price</label>
                        <input type="number" id="product-price" name="product-price"/>
                    </div>
                    <div>
                        <label for="product-qty">Product Quantity</label>
                        <input type="number" id="product-qty" name="product-qty" min="1" value="1"/>
                    </div>
                    <div>
                        <button type="button" id="add-to-cart">Add to Cart</button>
                    </div>
                </div>
                <h2>Cart Items</h2>
                <div class="cart-items">
                <table>
                <thead>
                        <tr>
                            <th>Product-Info</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                     </tr>
                    </thead>
                    <tbody id="cart-items-body">                      
                    </tbody>        
                </table>
                </div>
                <div class="card">
                    <h2 class="bill-summary">Total Bill</h2>
                    <div class="Bill-Summary">
                         <div class="total-items">Total Items:<span id="totalitems">0</span></div>
                         <div class="sub-total">Sub Total:<span id="subtotal">0.00</span></div>
                         <div class="gst">GST:<span id="gst">0.00</span></div>
                         <div class="grand-total">Grand Total:<span id="grandtotal">0.00</span></div>
                         <button id="generate-invoice-btn">Generate Invoice</button>
                    </div>
                    <div id="invoice-preview"></div>
                </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
